spring.application.name=bank-batch-jobs

spring.datasource.url=jdbc:hsqldb:mem:bankdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.hsqldb.jdbcDriver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

spring.batch.jdbc.initialize-schema=always
spring.batch.job.enabled=false

logging.level.org.springframework.batch=INFO
logging.level.org.hibernate.SQL=DEBUG

spring.sql.init.mode=always
spring.sql.init.schema-locations=classpath:org/springframework/batch/core/schema-hsqldb.sql

server.port=8080

